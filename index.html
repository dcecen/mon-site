<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RENOV CONSEIL EST — Conseil, ingénierie & gestion en Alsace</title>
  <meta name="description" content="RENOV CONSEIL EST accompagne vos projets de rénovation, d'ingénierie et de gestion locative en Alsace. Un interlocuteur unique, de l'étude à la réalisation." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            ink: {
              50:  '#f4f7fb',
              100: '#e6ecf3',
              200: '#cdd7e4',
              300: '#a8b9ce',
              400: '#7d96b4',
              500: '#5d7a9e',
              600: '#3f5e89',
              700: '#2c4a73',
              800: '#1f3a5f',
              900: '#142b52',
              950: '#0e1f3a',
            },
            sand: {
              50:  '#fdf5ed',
              100: '#fae6d2',
              200: '#f4cba5',
              300: '#ecaa6f',
              400: '#e08e44',
              500: '#d87a2e',
              600: '#b46220',
              700: '#8d4c1c',
              800: '#6d3c19',
              900: '#553014',
            },
          },
          boxShadow: {
            'soft': '0 1px 2px rgba(15,23,42,0.04), 0 8px 24px -8px rgba(15,23,42,0.10)',
            'card': '0 1px 0 rgba(15,23,42,0.04), 0 12px 32px -12px rgba(15,23,42,0.18)',
          },
        },
      },
    };
  </script>

  <style>
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: #0e1f3a; background: #ffffff; -webkit-font-smoothing: antialiased; }

    /* Striped placeholder pattern for image slots */
    .placeholder-stripes {
      background-color: #e6ecf3;
      background-image: repeating-linear-gradient(
        135deg,
        rgba(31, 58, 95, 0.05) 0 1px,
        transparent 1px 14px
      );
    }
    .placeholder-sand {
      background-color: #fae6d2;
      background-image: repeating-linear-gradient(
        135deg,
        rgba(180, 98, 32, 0.10) 0 1px,
        transparent 1px 14px
      );
    }

    /* Animated underline link */
    .nav-link { position: relative; }
    .nav-link::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -6px;
      height: 2px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .25s ease;
    }
    .nav-link:hover::after,
    .nav-link.is-active::after { transform: scaleX(1); }

    /* Subtle page enter */
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-enter { animation: pageIn .35s ease-out both; }

    /* Filter chips */
    .chip-active { background: #1f3a5f; color: white; }

    /* Logo image safety */
    .logo-img { height: 36px; width: auto; display: block; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="bg-white text-ink-900">
  <div id="root"></div>

  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/pages.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>

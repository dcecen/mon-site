  <style>
    html { scroll-behavior: smooth; }

    .placeholder-stripes {

    }

    @keyframes pageIn {
      from { transform: translateY(8px); }
      to   { transform: none; }
    }
    /* Content stays fully opaque at all times — only a subtle slide is animated,
       so a paused/never-started timeline can never leave the page blank. */
    .page-enter { opacity: 1; }
    @media (prefers-reduced-motion: no-preference) {
      .page-enter { animation: pageIn .3s ease-out; }
    }

    /* DPE bands */
    .dpe-band {
      position: relative;
      display: flex;
      align-items: center;
      color: white;
      font-size: 12px;
      padding: 6px 10px 6px 14px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .dpe-band::after {
      content: '';
      position: absolute;
      right: -10px;
      top: 0;
      bottom: 0;
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left-style: solid;
      border-left-width: 10px;

    }
